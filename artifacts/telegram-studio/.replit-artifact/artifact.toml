kind = "web"
previewPath = "/"
title = "استوديو بوت تيليغرام"
version = "1.0.0"
id = "artifacts/telegram-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25512

[services.development]
run = "pnpm --filter @workspace/telegram-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telegram-studio", "run", "build" ]
publicDir = "artifacts/telegram-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25512"
BASE_PATH = "/"
